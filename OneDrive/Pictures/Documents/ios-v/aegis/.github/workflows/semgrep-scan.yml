name: Semgrep scan

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  semgrep:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep

      - name: Run Semgrep CLI
        run: |
          semgrep --version
          semgrep --config p/ci --output results.sarif --output-format sarif || true

      - name: Ensure SARIF exists
        run: |
          if [ ! -f results.sarif ]; then echo '{}' > results.sarif; fi

      - name: Validate or create minimal SARIF
        run: |
          # ensure jq is available
          if ! command -v jq >/dev/null 2>&1; then sudo apt-get update && sudo apt-get install -y jq; fi
          if jq -e '.version and .runs' results.sarif >/dev/null 2>&1; then
            echo "SARIF valid"
          else
            echo "SARIF missing required fields; replacing with minimal valid SARIF"
            cat > results.sarif <<'SARIF'
{ "version": "2.1.0", "runs": [] }
SARIF
          fi

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
