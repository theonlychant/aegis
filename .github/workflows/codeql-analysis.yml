name: "CodeQL"

on:
  push:
    branches: [ master ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ master ]
  schedule:
    - cron: '0 2 * * 1'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'cpp', 'javascript', 'python', 'swift' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}

    - name: Build repository (best-effort for C/C++)
      if: contains(matrix.language, 'cpp')
      run: |
        echo "Attempting best-effort C/C++ build for CodeQL"
        set -e
        if [ -f CMakeLists.txt ]; then
          sudo apt-get update
          sudo apt-get install -y build-essential cmake
          cmake -S . -B build
          cmake --build build -- -j$(nproc)
        elif [ -f Makefile ]; then
          sudo apt-get update
          sudo apt-get install -y build-essential
          make -j$(nproc)
        else
          echo "No CMakeLists.txt or Makefile found; skipping automatic build."
        fi

    - name: Build
      run: |
        echo "Building repository for CodeQL analysis (best-effort)"
        # best-effort builds; customize per repo for more accurate results

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
