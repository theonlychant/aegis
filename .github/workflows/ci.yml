name: CI

on: [push, pull_request]

jobs:
  build-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
      - name: Generate Cargo.lock for engine-rust
        run: |
          cd engine-rust
          cargo generate-lockfile
      - name: Run Rust tests
        run: |
          rustup target add aarch64-apple-ios x86_64-apple-ios || true
          cargo test --manifest-path engine-rust/Cargo.toml --workspace --locked
  build-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'
      - name: Download Go modules
        run: |
          cd backend-go
          go mod download
      - name: Run Go tests
        working-directory: backend-go
        run: go test ./... 
  build-xcframework-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
      - name: Make scripts executable
        run: |
          chmod +x scripts/build_rust_ios.sh || true
          chmod +x scripts/create_xcframework.sh || true
      - name: Build XCFramework
        run: |
          ./scripts/build_rust_ios.sh
          ./scripts/create_xcframework.sh
  build-swift:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate Xcode project (if needed) and build with xcodebuild
        run: |
          set -euo pipefail
          PROJECT_PATH="ios-app/Aegis.xcodeproj"
          SCHEME="Aegis"
          DEST="platform=iOS Simulator,name=iPhone 14"

          # If an Xcode project isn't checked in but an xcodegen spec is, generate it.
          if [ ! -d "$PROJECT_PATH" ] && [ -f ios-app/project.yml ]; then
            echo "Generating Xcode project with xcodegen"
            brew install xcodegen || true
            cd ios-app
            xcodegen generate || true
            cd -
          fi

          if [ -d "$PROJECT_PATH" ]; then
            xcodebuild -project "$PROJECT_PATH" -scheme "$SCHEME" -sdk iphonesimulator -destination "$DEST" clean build test
          else
            echo "No Xcode project found at $PROJECT_PATH and no project.yml to generate one; skipping iOS build"
          fi
  security-scans:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run cargo-audit
        working-directory: engine-rust
        run: |
          cargo install cargo-audit || true
          cargo audit --deny warnings --ignore RUSTSEC-2025-0033 || true
      - name: Run go vet
        run: |
          cd backend-go
          go mod download
          go vet ./...
      - name: Run semgrep
        run: |
          pip install semgrep
          semgrep --config auto . || true
      - name: Run cargo-fuzz (placeholder)
        run: |
          echo "cargo-fuzz requires libFuzzer and runner setup; configure manually or run locally"
