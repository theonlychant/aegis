name: Deploy Website to GitHub Pages

on:
  push:
    branches: [ main, master ]
    paths:
      - 'website/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clear stale custom domain
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.request('DELETE /repos/{owner}/{repo}/pages/cname', {
                owner: context.repo.owner,
                repo: context.repo.repo
              });
              core.info('Removed custom domain from GitHub Pages.');
            } catch (error) {
              if (error.status === 404) {
                core.info('No custom domain set on GitHub Pages.');
              } else {
                throw error;
              }
            }

      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: website

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
