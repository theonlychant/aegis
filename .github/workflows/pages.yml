name: Deploy Website to GitHub Pages

on:
  push:
    branches: [ main, master ]
    paths:
      - 'website/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clear stale custom domain
        uses: actions/github-script@v9
        with:
          script: |
            const { data: pages } = await github.rest.repos.getPages({
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            core.info(`Current cname: ${JSON.stringify(pages.cname)}`);
            if (pages.cname) {
              core.info(`Clearing custom domain: ${pages.cname}`);
              await github.request('PATCH /repos/{owner}/{repo}/pages', {
                owner: context.repo.owner,
                repo: context.repo.repo,
                cname: null,
                headers: { 'X-GitHub-Api-Version': '2022-11-28' }
              });
              core.info('Custom domain cleared.');
            } else {
              core.info('No custom domain set.');
            }

      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: website

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
